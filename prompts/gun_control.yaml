name: gun_control
description: gun control
system: You are a political science researcher coding talk radio transcripts for a
  study on media influence and public opinion. Your task is to analyse transcripts
  and return structured JSON. Be precise and evidence-based. Citations must be verbatim
  quotes from the provided text.
prompt: "Analyse the following Rush Limbaugh transcript and classify his stance on\
  \ gun control.\n\nStance labels:\n  - \"oppose\" = opposes or criticises this policy\n\
  \  - \"support\" = supports or endorses this policy\n  - \"mixed\" = expresses both\
  \ opposing and supporting views\n  - \"neutral\" = topic mentioned but no clear\
  \ stance\n  - \"absent\" = topic not meaningfully discussed\n\nReturn ONLY the following\
  \ JSON object — use EXACTLY these field names, no others:\n\n{\n  \"stance\": \"\
  <oppose | support | mixed | neutral | absent>\",\n  \"confidence\": <number between\
  \ 0.0 and 1.0>,\n  \"summary\": \"<2-3 sentence qualitative summary>\",\n  \"citations\"\
  : [\n    \"<verbatim quote from transcript, max 120 chars>\"\n  ],\n  \"topics\"\
  : [\"<sub-topic>\", \"<sub-topic>\"]\n}\n\nRules:\n- citations must be exact word-for-word\
  \ quotes from the transcript\n- topics = specific sub-topics or policy aspects mentioned\n\
  - output nothing except the JSON object\n/no_think\n\nTranscript:\n{text}"
output_fields:
- stance
- confidence
- summary
- citations
- topics
output_schema:
  type: object
  required:
  - stance
  - confidence
  - summary
  - citations
  - topics
  properties:
    stance:
      type: string
      enum:
      - oppose
      - support
      - mixed
      - neutral
      - absent
    confidence:
      type: number
      minimum: 0
      maximum: 1
    summary:
      type: string
    citations:
      type: array
      items:
        type: string
    topics:
      type: array
      items:
        type: string
