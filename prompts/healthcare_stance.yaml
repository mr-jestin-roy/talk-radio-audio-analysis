name: healthcare_stance
description: Classify Rush Limbaugh's stance on healthcare policy with citations.
system: 'You are a political science researcher coding talk radio transcripts for
  a study

  on media influence and public opinion. Your task is to analyse transcripts and

  return structured JSON. Be precise and evidence-based. Citations must be verbatim

  quotes from the provided text.

  '
prompt: "Analyse the following Rush Limbaugh transcript and classify his stance on\n\
  ObamaCare healthcare policy.\n\nStance labels:\n- \"oppose\"    = opposes government-led\
  \ healthcare, the ACA/Obamacare, or mandates\n- \"support\"   = supports government\
  \ healthcare expansion or reform\n- \"mixed\"     = expresses both supportive and\
  \ opposing views\n- \"neutral\"   = healthcare is mentioned but no clear stance\
  \ taken\n- \"absent\"    = healthcare is not meaningfully discussed in this episode\n\
  \nReturn ONLY the following JSON object — use EXACTLY these field names, no others:\n\
  \n{\n  \"stance\": \"<oppose | support | mixed | neutral | absent>\",\n  \"confidence\"\
  : <number between 0.0 and 1.0>,\n  \"summary\": \"<2-3 sentence qualitative summary\
  \ of the healthcare content>\",\n  \"citations\": [\n    \"<verbatim quote from\
  \ transcript, max 120 chars>\",\n    \"<verbatim quote from transcript, max 120\
  \ chars>\"\n  ],\n  \"topics\": [\"<sub-topic>\", \"<sub-topic>\"]\n}\n\nRules:\n\
  - citations must be exact word-for-word quotes copied from the transcript below\n\
  - topics = specific healthcare sub-topics (e.g. ACA, Obamacare, mandate, Medicare,\
  \ insurance)\n- output nothing except the JSON object\n/no_think\n\nTranscript:\n\
  {text}\n"
output_fields:
- stance
- confidence
- summary
- citations
- topics
output_schema:
  type: object
  required:
  - stance
  - confidence
  - summary
  - citations
  - topics
  properties:
    stance:
      type: string
      enum:
      - oppose
      - support
      - mixed
      - neutral
      - absent
    confidence:
      type: number
      minimum: 0
      maximum: 1
    summary:
      type: string
    citations:
      type: array
      items:
        type: string
    topics:
      type: array
      items:
        type: string
